<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AREA TROUT MAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --ink: #0b2730;
      --deep: #08252d;
      --green: #0f7f70;
      --green-2: #159a85;
      --mint: #e8f7f2;
      --line: #dce7e5;
      --soft: #f4f8f7;
      --orange: #d98222;
      --gold: #e0a326;
      --blue: #287f94;
      --white: #fff;
      --shadow: 0 14px 36px rgba(10, 35, 40, .18);
      --shadow-soft: 0 8px 22px rgba(10, 35, 40, .10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eaf3f1;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 92px 1fr;
    }

    .header {
      position: relative;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 16px 26px 16px 40px;
      color: var(--white);
      background:
        radial-gradient(circle at 72% -35%, rgba(28, 151, 139, .32), transparent 34%),
        linear-gradient(90deg, #071f28 0%, #092933 48%, #071d26 100%);
      box-shadow: 0 10px 28px rgba(5, 20, 25, .25);
    }

    .back-to-map {
      display: none;
      height: 42px;
      padding: 0 14px;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 9px;
      color: var(--white);
      background: rgba(255, 255, 255, .05);
      font-size: 13px;
      font-weight: 700;
    }

    body.detail-view .back-to-map {
      display: inline-flex;
    }

    .brand {
      min-width: 455px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--white);
      background: rgba(255, 255, 255, .08);
    }

    .brand-mark svg {
      width: 42px;
      height: 42px;
      filter: drop-shadow(0 2px 1px rgba(0, 0, 0, .2));
    }

    .brand-title {
      margin: 0;
      font-family: "Montserrat", "Noto Sans JP", sans-serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: .05em;
    }

    .brand-copy {
      margin: 6px 0 0;
      font-size: 14px;
      color: rgba(255, 255, 255, .84);
      font-weight: 500;
    }

    .nav {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 22px;
      height: 100%;
    }

    .nav a {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255, 255, 255, .95);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      font-size: 15px;
    }

    .nav a:first-child::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 999px;
      background: var(--green-2);
    }

    .nav svg {
      width: 18px;
      height: 18px;
    }

    .header-tools {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .weather {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 9px 16px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 14px;
      background: rgba(255, 255, 255, .06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
    }

    .weather-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255, 255, 255, .12);
      font-size: 22px;
    }

    .temp {
      font-size: 25px;
      font-weight: 800;
      line-height: 1;
    }

    .place {
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255, 255, 255, .78);
      font-weight: 500;
    }

    .menu {
      width: 56px;
      height: 56px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 14px;
      color: var(--white);
      background: rgba(255, 255, 255, .05);
      font-size: 28px;
      line-height: 1;
    }

    .user-menu {
      position: absolute;
      top: 76px;
      right: 26px;
      z-index: 80;
      width: 232px;
      display: none;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .98);
      box-shadow: var(--shadow);
    }

    .user-menu.open {
      display: grid;
      gap: 6px;
    }

    .menu-item {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border: 0;
      border-radius: 8px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      font-weight: 700;
    }

    .menu-item:hover {
      background: #f2f8f6;
    }

    .menu-item.register {
      margin: 6px 0;
      border: 1px solid #bfe5dd;
      color: var(--green);
      background: #ecfaf6;
      box-shadow: 0 4px 12px rgba(15, 127, 112, .08);
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 516px 1fr;
      position: relative;
    }

    body.detail-view {
      overflow: auto;
    }

    body.register-view {
      overflow: auto;
      background: #f5f8f7;
    }

    body.detail-view .main,
    body.detail-view .map-tabs,
    body.register-view .header,
    body.register-view .main,
    body.register-view .map-tabs,
    body.register-view .facility-detail-page {
      display: none;
    }

    .sidebar {
      position: relative;
      z-index: 20;
      min-width: 0;
      overflow-y: auto;
      padding: 22px 17px 28px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 12px 0 30px rgba(11, 39, 48, .09);
    }

    .sidebar-close {
      position: fixed;
      left: 498px;
      top: calc(92px + (100vh - 92px) / 2);
      z-index: 24;
      width: 34px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 10px;
      color: var(--white);
      background: rgba(8, 48, 59, .96);
      box-shadow: var(--shadow-soft);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      transform: translateY(-50%);
    }

    body.sidebar-collapsed .sidebar-close {
      display: none;
    }

    body.sidebar-collapsed .main {
      grid-template-columns: 1fr;
    }

    body.sidebar-collapsed .sidebar {
      display: none;
    }

    .search-box {
      position: relative;
      margin-bottom: 15px;
    }

    .search-box input {
      width: 100%;
      height: 54px;
      padding: 0 54px 0 18px;
      border: 1px solid var(--line);
      border-radius: 11px;
      color: var(--ink);
      background: var(--white);
      outline: none;
      box-shadow: 0 2px 0 rgba(7, 37, 45, .02);
      font-weight: 500;
    }

    .search-box input::placeholder {
      color: #8a9999;
    }

    .search-icon {
      position: absolute;
      top: 50%;
      right: 18px;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      color: var(--ink);
    }

    .filter-card {
      margin-bottom: 11px;
      padding: 14px 13px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
    }

    .filter-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .reset {
      border: 0;
      color: var(--green);
      background: transparent;
      font-size: 12px;
      font-weight: 700;
    }

    .quick-filters,
    .type-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 36px;
      padding: 8px 17px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #162c32;
      background: var(--white);
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(9, 39, 48, .04);
    }

    .chip.active {
      color: var(--white);
      border-color: var(--green);
      background: var(--green);
      box-shadow: 0 6px 15px rgba(15, 127, 112, .24);
    }

    .type-filters {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      margin-bottom: 16px;
    }

    .type-btn {
      min-height: 64px;
      padding: 8px 5px;
      display: grid;
      place-items: center;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #142f36;
      background: #fbfdfd;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 2px 7px rgba(9, 39, 48, .04);
    }

    .type-btn svg {
      width: 23px;
      height: 23px;
    }

    .type-btn.active {
      color: var(--white);
      border-color: var(--green);
      background: var(--green);
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2px 2px 12px;
    }

    .result-count {
      font-size: 13px;
      color: #617174;
      font-weight: 500;
    }

    .result-count strong {
      color: var(--ink);
      font-size: 21px;
      margin-right: 4px;
    }

    .sort {
      width: 124px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--white);
      font-size: 13px;
      font-weight: 600;
    }

    .cards {
      display: grid;
      gap: 20px;
    }

    .facility-card {
      position: relative;
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 14px;
      min-height: 134px;
      height: 134px;
      padding: 12px;
      border: 1px solid #dfe7e5;
      border-radius: 9px;
      background: var(--white);
      box-shadow: var(--shadow-soft);
      transition: .18s ease;
      overflow: hidden;
    }

    .facility-card:hover,
    .facility-card.selected {
      border-color: var(--green-2);
      box-shadow: 0 10px 26px rgba(15, 127, 112, .16);
      transform: translateY(-1px);
    }

    .thumb {
      position: relative;
      overflow: hidden;
      border-radius: 7px;
      background:
        linear-gradient(175deg, rgba(15, 127, 112, .1), rgba(4, 24, 28, .35)),
        var(--photo);
      background-size: cover;
      background-position: center;
    }

    .badge-open {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 10px;
      border-radius: 7px;
      color: var(--white);
      background: var(--green-2);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 3px 9px rgba(0, 0, 0, .14);
    }

    .thumb .badge-open {
      position: absolute;
      top: 8px;
      left: 8px;
    }

    .thumb-fish {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(18, 125, 113, .92);
      color: var(--white);
    }

    .facility-main {
      min-width: 0;
      padding-right: 42px;
    }

    .facility-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 8px;
    }

    .facility-top > div:first-child {
      min-width: 0;
    }

    .facility-title {
      margin: 2px 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.25;
    }

    .area {
      margin: 0 0 10px;
      color: #4b5d61;
      font-size: 13px;
      font-weight: 500;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
      color: #142b31;
      font-size: 14px;
      font-weight: 700;
    }

    .star {
      color: var(--gold);
      font-size: 18px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-height: 22px;
      padding: 3px 7px;
      border: 1px solid #cae7e0;
      border-radius: 5px;
      color: #0a7b6d;
      background: #f6fffc;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .tag.blue {
      color: #246d94;
      border-color: #cce3ee;
      background: #f2fbff;
    }

    .tag.pink {
      color: #a24c61;
      border-color: #efd3da;
      background: #fff8fa;
    }

    .meta {
      display: flex;
      gap: 13px;
      flex-wrap: wrap;
      color: #4b6165;
      font-size: 12px;
      font-weight: 500;
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .favorite {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: #112d34;
      background: var(--white);
      box-shadow: 0 5px 14px rgba(10, 35, 40, .12);
      font-size: 21px;
    }

    .favorite.active {
      color: #e45c5c;
    }

    .card-detail-link {
      position: absolute;
      right: 14px;
      bottom: 24px;
      border: 0;
      color: rgba(15, 127, 112, .86);
      background: transparent;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .card-detail-link:hover {
      color: var(--green);
      text-decoration: underline;
    }

    .map-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: #bfe0e6;
    }

    .sidebar-toggle {
      display: none;
      position: absolute;
      left: 16px;
      top: 50%;
      z-index: 18;
      width: 38px;
      height: 58px;
      place-items: center;
      border: 0;
      border-radius: 10px;
      color: var(--white);
      background: rgba(8, 48, 59, .96);
      box-shadow: var(--shadow-soft);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      transform: translateY(-50%);
    }

    body.sidebar-collapsed .sidebar-toggle {
      display: grid;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .leaflet-control-container {
      display: none;
    }

    .layer-panel {
      position: absolute;
      top: 28px;
      left: 24px;
      z-index: 10;
      width: 124px;
      overflow: hidden;
      border-radius: 9px;
      background: rgba(255, 255, 255, .96);
      box-shadow: var(--shadow-soft);
    }

    .layer-panel button {
      width: 100%;
      height: 41px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 13px;
      border: 0;
      border-bottom: 1px solid #edf1f0;
      color: #173239;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
    }

    .layer-panel button:hover,
    .layer-panel button.active {
      background: #eef9f6;
      color: var(--green);
    }

    .map-search {
      position: absolute;
      top: 28px;
      left: 50%;
      z-index: 10;
      transform: translateX(-50%);
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 22px;
      border: 0;
      border-radius: 999px;
      color: var(--white);
      background: rgba(8, 37, 45, .93);
      box-shadow: var(--shadow-soft);
      font-weight: 700;
    }

    .view-toggle {
      position: absolute;
      top: 28px;
      right: 70px;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 7px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .75);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
    }

    .view-toggle button {
      min-width: 62px;
      height: 38px;
      border: 0;
      border-radius: 7px;
      color: #173239;
      background: transparent;
      font-weight: 700;
    }

    .view-toggle button.active {
      background: var(--white);
      box-shadow: 0 3px 10px rgba(15, 44, 50, .12);
    }

    .expand,
    .zoom-control {
      position: absolute;
      right: 24px;
      z-index: 10;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 9px;
      color: #122d34;
      background: var(--white);
      box-shadow: var(--shadow-soft);
      font-weight: 700;
    }

    .expand {
      top: 28px;
      width: 44px;
      height: 44px;
      font-size: 22px;
    }

    .zoom-control {
      bottom: 84px;
      width: 44px;
      overflow: hidden;
    }

    .zoom-control button {
      width: 44px;
      height: 40px;
      border: 0;
      background: var(--white);
      font-size: 24px;
      line-height: 1;
    }

    .zoom-control button + button {
      border-top: 1px solid var(--line);
    }

    .scale {
      position: absolute;
      right: 24px;
      bottom: 26px;
      z-index: 10;
      width: 96px;
      height: 34px;
      display: flex;
      align-items: end;
      justify-content: center;
      padding-bottom: 8px;
      border-radius: 7px;
      color: #4c666b;
      background: rgba(255, 255, 255, .52);
      font-size: 12px;
      font-weight: 600;
    }

    .scale::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 9px;
      height: 1px;
      background: #5d7b83;
    }

    .detail-card {
      position: absolute;
      top: 104px;
      right: 26px;
      z-index: 12;
      width: 386px;
      max-height: calc(100vh - 386px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .detail-photo {
      position: relative;
      flex: 0 0 auto;
      height: 198px;
      background:
        linear-gradient(180deg, rgba(3, 28, 34, .04), rgba(3, 28, 34, .22)),
        var(--photo);
      background-size: cover;
      background-position: center;
    }

    .detail-photo .badge-open {
      position: absolute;
      top: 18px;
      left: 18px;
    }

    .detail-fav {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 45px;
      height: 45px;
      border: 0;
      border-radius: 50%;
      color: #df4f5b;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow-soft);
      font-size: 22px;
    }

    .detail-fav.active {
      color: #e45c5c;
    }

    .photo-next {
      position: absolute;
      right: 18px;
      bottom: 16px;
      color: var(--white);
      font-size: 30px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .45);
    }

    .detail-body {
      padding: 20px 21px 21px;
      overflow-y: auto;
    }

    .detail-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 7px;
    }

    .detail-title {
      margin: 0;
      font-size: 25px;
      font-weight: 800;
    }

    .detail-address {
      margin: 0 0 14px;
      color: #52666a;
      font-size: 13px;
      font-weight: 500;
    }

    .detail-list {
      display: grid;
      gap: 13px;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 500;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 102px 1fr;
      gap: 14px;
      align-items: start;
    }

    .detail-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #112f36;
      font-weight: 700;
    }

    .detail-value {
      color: #394f54;
    }

    .detail-value a {
      color: var(--green);
      text-decoration: none;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1.12fr;
      gap: 12px;
      margin-top: 22px;
    }

    .primary-btn,
    .outline-btn {
      height: 44px;
      border-radius: 8px;
      font-weight: 700;
    }

    .outline-btn {
      border: 1px solid #12353d;
      color: #12353d;
      background: var(--white);
    }

    .primary-btn {

      font-size: 12px;
    }

    .upload-box {

      display: grid;
      place-items: center;
      padding: 18px;
      border: 1px dashed #c7d8d5;
      border-radius: 8px;
      color: #536a70;
      background: #fbfdfd;
      text-align: center;
      font-size: 13px;
      font-weight: 700;

      color: var(--ink);
    }

    .sub-upload-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .mini-upload {
      height: 72px;
      display: grid;
      place-items: center;
      border: 1px dashed #c7d8d5;
      border-radius: 7px;
      color: #8aa0a4;
      background: #fbfdfd;
      font-size: 22px;
    }

      color: #536a70;
      font-size: 11px;
      font-weight: 800;
    }

      padding: 18px;
      border: 1px solid #cce7e0;
      border-radius: 9px;
      background: #f2fbf8;
    }

    .confirm-intro h3 {
      margin: 0 0 8px;
      color: var(--green);
      font-size: 19px;
      font-weight: 800;
    }

    .confirm-intro p {
      margin: 0;
      color: #536a70;
      font-size: 13px;
      font-weight: 500;
    }

    .confirm-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .confirm-card {
      padding: 16px;
      border: 1px solid #e2ece9;
      border-radius: 9px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(10, 35, 40, .05);

    .confirm-card h3 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 16px;
      font-weight: 800;
    }

      display: grid;
      gap: 8px;
      color: #30484e;
      font-size: 13px;
      line-height: 1.55;
    }

    .confirm-list strong {
      color: var(--ink);
      font-weight: 800;
    }

    .preview-photo {
      min-height: 128px;
      border-radius: 8px;
      background-image: linear-gradient(180deg, rgba(0, 48, 53, .08), rgba(0, 48, 53, .22)), url('assets/trout-pond-detail.png');
      background-position: center;
      background-size: cover;
    }

    .preview-thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .preview-thumb {
      aspect-ratio: 4 / 3;
      border-radius: 7px;
      background-image: url('assets/trout-pond-detail.png');
      background-position: center;
      background-size: cover;
      border: 1px solid #dbe7e4;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .tips-card {
      padding: 16px;
      border: 1px solid #cce7e0;
      border-radius: 8px;
      background: #ecfaf6;
    }

    .tips-card h3 {
      margin: 0 0 10px;
      color: var(--green);
      font-size: 16px;
      font-weight: 800;
    }

    .tips-card ul {
      margin: 0;
      padding-left: 18px;
      color: #30484e;
      line-height: 1.8;
      font-size: 13px;
      font-weight: 500;

    .register-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 28px 24px;
    }

    .draft-btn,
    .next-btn {
      height: 44px;
      border-radius: 8px;
      font-weight: 800;

    .draft-btn {
      border: 1px solid var(--green);

      background: #fff;
    }

    .next-btn {
      border: 1px solid var(--green);
      color: #fff;
      background: var(--green);

      }

        display: none;

      .weather {

        padding: 8px 10px;
      }

      .place {
        display: none;
      }

      .menu {
        width: 50px;
        height: 50px;
      }

      .main {
        display: block;
        min-height: calc(100vh - 82px);
      }

      .sidebar {
        display: none;
        height: calc(100vh - 82px);
        padding-bottom: 78px;
      }

      .sidebar-close {
        display: none;
      }

      .map-wrap {
        height: calc(100vh - 82px);
      }

      .sidebar-toggle {
        display: none;
      }

      body.sidebar-collapsed .sidebar-toggle {
        display: none;
      }

      body.show-list .sidebar {
        display: block;
      }

      body.show-list .map-wrap {
        display: none;
      }

      .type-filters {
        grid-template-columns: repeat(3, 1fr);
      }

      .detail-card {
        top: auto;
        left: 14px;
        right: 14px;
        bottom: 82px;
        width: auto;
        max-height: 52vh;
        overflow-y: auto;
      }

      .detail-photo {
        height: 132px;
      }

      .detail-body {
        padding: 15px;
      }

      .detail-title {
        font-size: 21px;
      }

      .layer-panel {
        top: 16px;
        left: 14px;
        width: 116px;
      }

      .map-search {
        display: none;
      }

      .view-toggle {
        top: 16px;
        right: 66px;
      }

      .expand {
        top: 16px;
        right: 14px;
      }

      .spot-bar {
        display: none;
      }

      .map-tabs {
        display: flex;
      }
    }

    @media (max-width: 560px) {
      .header-tools {
        gap: 8px;
      }

      .weather {
        display: none;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .facility-card {
        grid-template-columns: 100px 1fr;
      }

      .facility-card .favorite {
        right: 14px;
        top: 14px;
      }

      .facility-card {

        height: auto;
        padding-bottom: 52px;
      }

      .meta {
        gap: 8px;
      }

      .detail-row {
        grid-template-columns: 88px 1fr;
      }

      .detail-actions {
        grid-template-columns: 1fr;
      }

      .facility-detail-page {
        height: auto;
        min-height: calc(100vh - 82px);
        padding: 14px;
      }

      .detail-hero,

        grid-template-columns: 1fr;
      }

      .hero-photo {
        height: 260px;

      .hero-summary {

      .detail-tabs {

      }

        grid-template-columns: 1fr;
      }

      .register-page {
        padding: 14px;

      }

      .view-toggle button {
        min-width: 52px;
      }
    }

</head>

    function initMap() {
      map = L.map("map", {
        zoomControl: false,
        attributionControl: false
      }).setView([35.6908, 139.7689], 8);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);

      map.on("zoomend", updateScaleLabel);
      renderMarkers();
      updateScaleLabel();
    }

    function renderMarkers() {
      markers.forEach(marker => marker.remove());
      markers = [];

      currentFacilities.forEach((facility, index) => {
        const isSelected = facility.id === selectedFacilityId;
        const marker = L.marker([facility.lat, facility.lng], {
          icon: L.divIcon({
            className: "",
            html: `
              <div class="fish-marker ${isSelected ? "orange" : ""}">
                <span>${isSelected ? fishSvg() : index + 1}</span>
              </div>
            `,
            iconSize: [42, 42],
            iconAnchor: [21, 42],
            popupAnchor: [0, -38]
          })
        }).addTo(map);

        marker.bindPopup(facility.name);
        marker.on("click", () => selectFacility(facility.id));
        markers.push(marker);
      });
    }

    function selectFacility(id) {
      const facility = facilities.find(item => item.id === id);
      if (!facility) return;

      selectedFacilityId = id;
      map.setView([facility.lat, facility.lng], Math.max(map.getZoom(), 10), { animate: true });
      if (!facility.nearbyLayerSpots && activeSpotLayerCategory) {
        activeSpotLayerCategory = null;
      }
      renderMarkers();
      renderFacilityList(currentFacilities);
      renderDetailCard(facility);
      renderNearbySpots(facility);
      if (facility.nearbyLayerSpots && activeSpotLayerCategory) {
        renderNearbyLayerSpots(activeSpotLayerCategory);
      } else {
        activeSpotLayerCategory = null;
        clearNearbyLayerMarkers();
      }
      updateLayerButtonStates();
    }

    function searchFacilities(keyword) {
      const normalizedKeyword = keyword.trim().toLowerCase();
      currentFacilities = facilities.filter(facility => {
        const text = [
          facility.name,
          facility.prefecture,
          facility.city,
          facility.address,
          ...facility.tags
        ].join(" ").toLowerCase();

        const matchesKeyword = !normalizedKeyword || text.includes(normalizedKeyword);
        const matchesQuick = [...activeQuickFilters].every(filter => {
          if (filter === "open") return facility.open;
          return facility.type.includes(filter);
        });
        const matchesType = activeType === "all" || facility.type.includes(activeType);
        return matchesKeyword && matchesQuick && matchesType;
      });

      if (!currentFacilities.some(facility => facility.id === selectedFacilityId) && currentFacilities.length) {
        selectedFacilityId = currentFacilities[0].id;
        if (!currentFacilities[0].nearbyLayerSpots && activeSpotLayerCategory) {
          activeSpotLayerCategory = null;
        }
        renderDetailCard(currentFacilities[0]);
        renderNearbySpots(currentFacilities[0]);
        if (currentFacilities[0].nearbyLayerSpots && activeSpotLayerCategory) {
          renderNearbyLayerSpots(activeSpotLayerCategory);
        } else {
          activeSpotLayerCategory = null;
          clearNearbyLayerMarkers();
        }
        updateLayerButtonStates();
      }

      renderFacilityList(currentFacilities);
      renderMarkers();
      document.getElementById("resultCount").textContent = currentFacilities.length ? currentFacilities.length : 0;
    }

    async function fetchNearbyPlaces(lat, lng, category) {
      // ここでGeoapify Places APIを呼び出す
      // 例: https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lng},${lat},5000&apiKey=YOUR_API_KEY
      return Promise.resolve([
        { name: "セブンイレブン", category, minutes: 4, lat: lat + 0.01, lng: lng + 0.01 },
        { name: "湖畔食堂", category, minutes: 5, lat: lat - 0.01, lng: lng + 0.012 }
      ]);
    }

    async function fetchRoute(fromLat, fromLng, toLat, toLng) {
      // ここでGeoapify Routing APIを呼び出す
      // 例: https://api.geoapify.com/v1/routing?waypoints=${fromLat},${fromLng}|${toLat},${toLng}&mode=drive&apiKey=YOUR_API_KEY
      return Promise.resolve({
        distanceKm: 18.4,
        durationMin: 27,
        from: [fromLat, fromLng],
        to: [toLat, toLng]
      });
    }

    async function geocodeAddress(address) {
      // ここでGeoapify Geocoding APIを呼び出す
      // 例: https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(address)}&apiKey=YOUR_API_KEY
      const found = facilities.find(facility => facility.address === address);
      return Promise.resolve(found ? { lat: found.lat, lng: found.lng } : null);
    }

    function toggleFavorite(id) {
      favorites[id] = !favorites[id];
      renderFacilityList(currentFacilities);
      const selectedFacility = facilities.find(facility => facility.id === selectedFacilityId);
      if (selectedFacility) renderDetailCard(selectedFacility);
      if (viewMode === "detail") renderFacilityDetailPage(selectedFacility);
    }

    function showFacilityDetail(id) {
      const facility = facilities.find(item => item.id === id);
      if (!facility) return;
      selectedFacilityId = id;
      viewMode = "detail";
      renderFacilityDetailPage(facility);
      document.body.classList.add("detail-view");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showMapView() {
      viewMode = "map";

    function checkPill(label, checked = false) {
      return `<label class="check-pill"><input type="checkbox" ${checked ? "checked" : ""}> ${label}</label>`;
    }

    function radioPill(label, name, checked = false) {
      return `<label class="check-pill"><input type="radio" name="${name}" ${checked ? "checked" : ""}> ${label}</label>`;
    }

    function renderStepNav() {
      return registerSteps.map((step, index) => `
        <div class="step ${registerStep === index + 1 ? "active" : ""}">
          <span class="step-num">${index + 1}</span>${step}
        </div>
      `).join("");
    }

    function setRegisterStep(step) {
      registerStep = Math.max(1, Math.min(5, step));
      renderRegisterPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function validateRegisterStep() {
      const errorBox = document.getElementById("registerErrors");
      const requiredFields = [...document.querySelectorAll("#registerPage [data-required='true']")];
      const errors = [];

      requiredFields.forEach(field => {
        const wrapper = field.closest(".form-field");
        const label = field.dataset.label || wrapper?.querySelector("label")?.textContent?.replace("*", "").trim() || "必須項目";
        const isPlaceholderSelect = field.tagName === "SELECT" && field.selectedIndex === 0 && field.options[0]?.textContent.includes("選択");
        const isEmpty = !String(field.value || "").trim() || isPlaceholderSelect;

        wrapper?.classList.toggle("has-error", isEmpty);
        if (isEmpty) errors.push(`${label}を入力してください`);
      });

      if (errors.length) {
        errorBox.innerHTML = `<strong>未入力の必須項目があります</strong><ul>${errors.map(error => `<li>${error}</li>`).join("")}</ul>`;
        errorBox.classList.add("show");
        errorBox.scrollIntoView({ behavior: "smooth", block: "start" });
        return false;
      }

      errorBox.classList.remove("show");
      errorBox.innerHTML = "";
      return true;
    }

    function handleRegisterNext() {
      if (!validateRegisterStep()) return;
      setRegisterStep(registerStep + 1);
    }

                  <span><strong>紹介文：</strong>自然に囲まれた広大なエリアに、クリアな湧き水が注ぐ管理釣り場です。</span>
                </div>
              </section>
              <section class="confirm-card">
                <h3>料金・ルール</h3>
                <div class="confirm-list">
                  <span><strong>大人：</strong>4,200円</span>
                  <span><strong>子供：</strong>2,100円</span>
                  <span><strong>延長料金：</strong>500円</span>
                  <span><strong>注意事項：</strong>バーブレスフックの使用を推奨します。キャッチ＆リリースが基本です。</span>
                </div>
              </section>
              <section class="confirm-card">
                <h3>運営・特徴</h3>
                <div class="confirm-list">
                  <span><strong>主な魚種：</strong>ニジマス、イワナ</span>
                  <span><strong>放流頻度：</strong>週1〜2回程度</span>
                  <span><strong>放流曜日：</strong>土・日</span>
                  <span><strong>ポンド数：</strong>3</span>
                  <span><strong>平均水深：</strong>1.5〜3.0m</span>
                  <span><strong>水質：</strong>クリア</span>
                  <span><strong>ナイター営業：</strong>あり</span>
                  <span><strong>アクセス：</strong>東金ICから車で20分</span>
                </div>
              </section>
              <section class="confirm-card">
                <h3>設備・サービス</h3>
                <div class="confirm-list">
                  <span>トイレ、自動販売機、休憩所・東屋、売店、レンタル、Wi-Fi、ゴミ捨て場</span>
                  <span>レンタルタックル、ルアー販売、エサ販売、ポイントマップ配布、釣果情報の提供</span>
                  <span><strong>ペット同伴：</strong>可</span>
                  <span><strong>バリアフリー対応：</strong>一部対応</span>
                </div>
              </section>
              <section class="confirm-card">
                <h3>登録する写真・マップ</h3>
                <div class="preview-photo"></div>
                <div class="preview-thumbs">${Array.from({ length: 6 }, () => `<div class="preview-thumb"></div>`).join("")}</div>
                <div class="preview-photo" style="margin-top:10px;min-height:96px;"></div>
                <div class="tag-list">${["ルアーOK", "フライOK", "初心者歓迎", "ナイターあり", "駐車場あり", "レンタルあり"].map(tag => `<span class="tag">◆ ${tag}</span>`).join("")}</div>
              </section>
            </div>
          </div>

          <aside class="upload-column">
            <section class="tips-card">
              <h3>登録のポイント</h3>
              <ul>
                <li>正確な情報を入力することで、ユーザーに信頼される釣り場になります</li>
                <li>写真は明るく、実際の雰囲気が伝わるものを選びましょう</li>
                <li>審査には1〜3営業日程度かかります</li>
                <li>登録後も情報の編集・更新が可能です</li>
              </ul>
            </section>
          </aside>
        </div>
      `;
    }

    function renderRegisterStepContent() {
      if (registerStep === 1) return renderBasicRegisterStep();
      if (registerStep === 2) return renderOperationRegisterStep();
      if (registerStep === 3) return renderServiceRegisterStep();
      if (registerStep === 4) return renderPhotoRegisterStep();
      return renderConfirmRegisterStep();
    }

    function renderRegisterPage() {
      const container = document.getElementById("registerPage");
      if (!container) return;

      container.innerHTML = `
        <div class="register-shell">
          <button class="register-back" type="button" onclick="showMapView()">← マップに戻る</button>
          <div class="register-card">
            <div class="register-head">
              <h2>釣り場を登録する</h2>
              <p>新しい管理釣り場の情報を登録できます。審査後、サイトに掲載されます。</p>
            </div>

            <div class="steps">
              ${renderStepNav()}
            </div>

            <div class="register-error-summary" id="registerErrors"></div>

            ${renderRegisterStepContent()}

            <div class="register-actions">
              <button class="draft-btn" type="button">下書き保存</button>
              <button class="next-btn" type="button" onclick="${registerStep < 5 ? "handleRegisterNext()" : "return false"}">${registerStep < 5 ? "次へ進む" : "登録内容を送信する"}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderNearbySpots(facility) {
      const container = document.getElementById("nearbySpots");
      const hasRealNearbySpots = Boolean(facility.nearbySpots?.length);
      const spots = hasRealNearbySpots ? facility.nearbySpots : defaultNearbySpots;

      container.classList.toggle("is-real", hasRealNearbySpots);
      container.innerHTML = spots.map(spot => `
        <button class="spot ${activeSpotLayerCategory === spot.layerCategory ? "active" : ""}" type="button" data-nearby-layer="${spot.layerCategory}">
          <div class="spot-icon">${spot.icon}</div>
          <div class="spot-label">
            <div class="spot-name" title="${spot.category}">${spot.category}</div>
            <div class="spot-time" title="${spot.name || spot.label}">${spot.name || spot.label}</div>
          </div>
        </button>
      `).join("");
    }

    function clearNearbyLayerMarkers() {
      nearbyLayerMarkers.forEach(marker => marker.remove());
      nearbyLayerMarkers = [];
    }

    function renderNearbyLayerSpots(category) {
      clearNearbyLayerMarkers();
      const selectedFacility = facilities.find(facility => facility.id === selectedFacilityId);
      const layerSpots = selectedFacility?.nearbyLayerSpots?.[category] || [];
      if (!layerSpots.length) return;

      layerSpots.forEach(spot => {
        const marker = L.marker([spot.lat, spot.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div class="nearby-layer-marker">${spot.icon}</div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -16]
          })
        }).addTo(map);

        marker.bindPopup(`${spot.name}<br><small>${category}</small>`);
        nearbyLayerMarkers.push(marker);
      });
    }

    function toggleSpotLayer(category) {
      const selectedFacility = facilities.find(facility => facility.id === selectedFacilityId);
      if (!selectedFacility?.nearbyLayerSpots?.[category]) return;

      if (activeSpotLayerCategory === category) {
        activeSpotLayerCategory = null;
        clearNearbyLayerMarkers();
      } else {
        activeSpotLayerCategory = category;
        renderNearbyLayerSpots(category);
      }

      renderNearbySpots(selectedFacility);
      updateLayerButtonStates();
    }

    function clearTrafficLayer() {
      trafficLayerItems.forEach(item => item.remove());
      trafficLayerItems = [];
    }

    function renderTrafficLayer() {
      clearTrafficLayer();
      trafficLayer.forEach(segment => {
        const line = L.polyline(segment.coordinates, {
          color: segment.color,
          weight: 7,
          opacity: .86,
          lineCap: "round"
        }).addTo(map);

        const centerIndex = Math.floor(segment.coordinates.length / 2);
        const label = L.marker(segment.coordinates[centerIndex], {
          icon: L.divIcon({
            className: "",
            html: `<div class="traffic-label">${segment.label}</div>`,
            iconSize: [64, 24],
            iconAnchor: [32, 12]
          })
        }).addTo(map);

        trafficLayerItems.push(line, label);
      });
    }

    function toggleTrafficLayer() {
      isTrafficLayerVisible = !isTrafficLayerVisible;
      if (isTrafficLayerVisible) {
        renderTrafficLayer();
      } else {
        clearTrafficLayer();
      }
      updateLayerButtonStates();
    }

    function updateLayerButtonStates() {
      document.querySelectorAll(".layer-panel button").forEach(button => {
        const layer = button.dataset.layer;
        const isActive =
          layer === activeSpotLayerCategory ||
          (layer === "traffic" && isTrafficLayerVisible) ||
          (layer === "current-location" && !activeSpotLayerCategory && !isTrafficLayerVisible);
        button.classList.toggle("active", isActive);
      });
    }

    function moveToMockCurrentLocation() {
      // 将来的にはここをGeolocation API + Geoapify Geocoding APIに置き換える
      const mockCurrentLocation = {
        lat: 35.7306,
        lng: 139.7196,
        zoom: 13
      };
      map.setView([mockCurrentLocation.lat, mockCurrentLocation.lng], mockCurrentLocation.zoom, { animate: true });
    }

    function getScaleLabel(zoom) {
      if (zoom <= 8) return "50 km";
      if (zoom <= 10) return "10 km";
      if (zoom <= 12) return "5 km";
      if (zoom <= 14) return "1 km";
      if (zoom <= 16) return "200 m";
      return "100 m";
    }

    function updateScaleLabel() {
      const scale = document.querySelector(".scale");
      if (!scale || !map) return;
      scale.textContent = getScaleLabel(map.getZoom());
    }

    function setSidebarCollapsed(collapsed) {
      sidebarCollapsed = collapsed;
      document.body.classList.toggle("sidebar-collapsed", sidebarCollapsed);
      setTimeout(() => {
        if (map) map.invalidateSize();
      }, 180);
    }

    function renderTags(tags) {
      return tags.map(tag => {
        const className = tag.includes("ナイター") ? "tag blue" : tag.includes("キッズ") || tag.includes("女性") ? "tag pink" : "tag";
        const icon = tag.includes("ルアー") ? "🎣" : tag.includes("フライ") ? "🪶" : tag.includes("C&R") ? "↻" : tag.includes("ナイター") ? "☾" : tag.includes("キッズ") ? "♟" : "◆";
        return `<span class="${className}">${icon} ${tag}</span>`;
      }).join("");
    }

    function fishSvg() {
      return `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 12c4.7-5.2 10.3-6.3 16.7-3.5L22 6.7v10.6l-2.3-1.8C13.3 18.3 7.7 17.2 3 12Zm13-1.4a1.3 1.3 0 1 0 0-2.6 1.3 1.3 0 0 0 0 2.6Z"/></svg>`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setSidebarCollapsed(sidebarCollapsed);
      initMap();
      renderFacilityList(facilities);
      renderDetailCard(facilities[0]);
      renderNearbySpots(facilities[0]);

      document.getElementById("sidebarToggle").addEventListener("click", () => {
        setSidebarCollapsed(false);
      });

      document.getElementById("sidebarClose").addEventListener("click", () => {
        setSidebarCollapsed(true);
      });

      document.getElementById("backToMap").addEventListener("click", showMapView);
      document.getElementById("menuButton").addEventListener("click", event => {
        event.stopPropagation();
        toggleUserMenu();
      });
      document.getElementById("openRegister").addEventListener("click", showRegisterView);
      document.addEventListener("click", event => {
        if (!event.target.closest("#userMenu") && !event.target.closest("#menuButton")) {
          closeUserMenu();
        }
      });

      document.getElementById("searchInput").addEventListener("input", event => {
        searchFacilities(event.target.value);
      });

      document.querySelectorAll(".filter-btn").forEach(button => {
        button.addEventListener("click", () => {
          const filter = button.dataset.filter;
          button.classList.toggle("active");
          if (activeQuickFilters.has(filter)) {
            activeQuickFilters.delete(filter);
          } else {
            activeQuickFilters.add(filter);
          }
          searchFacilities(document.getElementById("searchInput").value);
        });
      });

      document.querySelectorAll(".type-filter").forEach(button => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".type-filter").forEach(item => item.classList.remove("active"));
          button.classList.add("active");
          activeType = button.dataset.type;
          searchFacilities(document.getElementById("searchInput").value);
        });
      });

      document.getElementById("resetFilters").addEventListener("click", () => {
        activeQuickFilters.clear();
        activeType = "all";
        document.querySelectorAll(".filter-btn").forEach(item => item.classList.remove("active"));
        document.querySelectorAll(".type-filter").forEach(item => item.classList.toggle("active", item.dataset.type === "all"));
        document.getElementById("searchInput").value = "";
        searchFacilities("");
      });

      document.getElementById("zoomIn").addEventListener("click", () => map.zoomIn());
      document.getElementById("zoomOut").addEventListener("click", () => map.zoomOut());

      document.getElementById("nearbySpots").addEventListener("click", event => {
        const spotButton = event.target.closest("[data-nearby-layer]");
        if (!spotButton) return;
        toggleSpotLayer(spotButton.dataset.nearbyLayer);
      });

      document.querySelectorAll(".layer-panel button").forEach(button => {
        button.addEventListener("click", () => {
          const layer = button.dataset.layer;
          if (layer === "current-location") {
            moveToMockCurrentLocation();
            updateLayerButtonStates();
            return;
          }

          if (layer === "traffic") {
            toggleTrafficLayer();
            return;
          }

          toggleSpotLayer(layer);
        });
      });

      document.querySelectorAll(".view-toggle button").forEach(button => {
        button.addEventListener("click", () => {
          const group = button.parentElement.querySelectorAll("button");
          group.forEach(item => item.classList.remove("active"));
          button.classList.add("active");
        });
      });

      document.getElementById("tabMap").addEventListener("click", () => {
        document.body.classList.remove("show-list");
        document.getElementById("tabMap").classList.add("active");
        document.getElementById("tabList").classList.remove("active");
        setTimeout(() => map.invalidateSize(), 180);
      });

      document.getElementById("tabList").addEventListener("click", () => {
        document.body.classList.add("show-list");
        document.getElementById("tabList").classList.add("active");
        document.getElementById("tabMap").classList.remove("active");
      });
    });
  </script>
</body>
</html>
